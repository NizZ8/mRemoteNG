name: Qodo On-Demand Review

on:
  workflow_dispatch:
    inputs:
      commits_back:
        description: "Number of commits to review"
        required: true
        default: "1"
        type: string
      branch:
        description: "Branch to review"
        required: false
        default: "main"
        type: string

permissions: {}

jobs:
  create-review-pr:
    name: Create review PR for Qodo
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.branch }}

      - name: Create temporary branches and PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          BRANCH="${{ inputs.branch }}"
          N="${{ inputs.commits_back }}"
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          REVIEW_BASE="review/qodo-base-${TIMESTAMP}"
          REVIEW_HEAD="review/qodo-head-${TIMESTAMP}"

          # Both branches must be non-default for Qodo to trigger
          # HEAD branch = current state (the code to review)
          git checkout -b "$REVIEW_HEAD"
          git push origin "$REVIEW_HEAD"

          # BASE branch = N commits behind (the old state)
          BASE_SHA=$(git rev-parse "HEAD~${N}")
          git checkout -b "$REVIEW_BASE" "$BASE_SHA"
          git push origin "$REVIEW_BASE"

          # Create PR: base=old state, head=new state
          PR_URL=$(gh pr create \
            --base "$REVIEW_BASE" \
            --head "$REVIEW_HEAD" \
            --title "Qodo Review: last ${N} commits on ${BRANCH}" \
            --body "$(cat <<EOF
          **Automated Qodo on-demand review.**

          Reviewing the last ${N} commit(s) on \`${BRANCH}\`.
          This PR will be auto-closed after the review completes (~5 min).

          > Triggered via workflow_dispatch
          EOF
          )")

          echo "### Qodo Review PR Created" >> "$GITHUB_STEP_SUMMARY"
          echo "PR: ${PR_URL}" >> "$GITHUB_STEP_SUMMARY"
          echo "Qodo will post its review automatically." >> "$GITHUB_STEP_SUMMARY"

          PR_NUMBER=$(echo "$PR_URL" | grep -oP '\d+$')
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "review_base=$REVIEW_BASE" >> "$GITHUB_OUTPUT"
          echo "review_head=$REVIEW_HEAD" >> "$GITHUB_OUTPUT"
        id: create_pr

      - name: Wait for Qodo review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.create_pr.outputs.pr_number }}"
          echo "Waiting for Qodo to review PR #${PR_NUMBER}..."

          # Poll for up to 5 minutes (Qodo typically responds in 1-3 min)
          for i in $(seq 1 30); do
            COMMENTS=$(gh pr view "$PR_NUMBER" --json comments --jq '.comments | length')
            REVIEW_COMMENTS=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}/comments" --jq 'length')
            TOTAL=$((COMMENTS + REVIEW_COMMENTS))

            if [ "$TOTAL" -gt 0 ]; then
              echo "Qodo review detected ($TOTAL comments)."
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "### Qodo Review Results" >> "$GITHUB_STEP_SUMMARY"
              echo "Review posted on PR #${PR_NUMBER}. Check the PR link above for details." >> "$GITHUB_STEP_SUMMARY"
              break
            fi

            echo "  Attempt $i/30 — no comments yet, waiting 10s..."
            sleep 10
          done

      - name: Cleanup — close PR and delete branches
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.create_pr.outputs.pr_number }}"
          REVIEW_BASE="${{ steps.create_pr.outputs.review_base }}"
          REVIEW_HEAD="${{ steps.create_pr.outputs.review_head }}"

          if [ -n "$PR_NUMBER" ]; then
            gh pr close "$PR_NUMBER" --comment "Review complete. Auto-closing." 2>/dev/null || true
          fi
          if [ -n "$REVIEW_BASE" ]; then
            git push origin --delete "$REVIEW_BASE" 2>/dev/null || true
          fi
          if [ -n "$REVIEW_HEAD" ]; then
            git push origin --delete "$REVIEW_HEAD" 2>/dev/null || true
          fi

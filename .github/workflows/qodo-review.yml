name: Qodo On-Demand Review

on:
  workflow_dispatch:
    inputs:
      commits_back:
        description: "Number of commits to review"
        required: true
        default: "1"
        type: string
      branch:
        description: "Branch to review"
        required: false
        default: "main"
        type: string

permissions: {}

jobs:
  create-review-pr:
    name: Create review PR for Qodo
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.branch }}

      - name: Create temporary base branch and PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          BRANCH="${{ inputs.branch }}"
          N="${{ inputs.commits_back }}"
          REVIEW_BASE="review/qodo-base-$(date +%Y%m%d-%H%M%S)"

          # Create a branch N commits behind HEAD as the PR base
          BASE_SHA=$(git rev-parse "HEAD~${N}")
          git checkout -b "$REVIEW_BASE" "$BASE_SHA"
          git push origin "$REVIEW_BASE"

          # Create PR: base=old state, head=current branch (shows last N commits as diff)
          PR_URL=$(gh pr create \
            --base "$REVIEW_BASE" \
            --head "$BRANCH" \
            --title "Qodo Review: last ${N} commits on ${BRANCH}" \
            --body "$(cat <<'EOF'
          **Automated Qodo on-demand review.**

          This PR exists solely to trigger a Qodo code review on recent commits.
          It will be auto-closed after the review completes.

          > Triggered via workflow_dispatch
          EOF
          )")

          echo "### Qodo Review PR Created" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "PR: ${PR_URL}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Qodo will post its review automatically. Check the PR for comments." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "After reading the review, close the PR and delete the \`${REVIEW_BASE}\` branch." >> "$GITHUB_STEP_SUMMARY"

          # Extract PR number for the cleanup job
          PR_NUMBER=$(echo "$PR_URL" | grep -oP '\d+$')
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "review_base=$REVIEW_BASE" >> "$GITHUB_OUTPUT"
        id: create_pr

      - name: Wait for Qodo review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.create_pr.outputs.pr_number }}"
          echo "Waiting for Qodo to review PR #${PR_NUMBER}..."

          # Poll for up to 5 minutes (Qodo typically responds in 1-3 min)
          for i in $(seq 1 30); do
            COMMENTS=$(gh pr view "$PR_NUMBER" --json comments --jq '.comments | length')
            REVIEW_COMMENTS=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}/comments" --jq 'length')
            TOTAL=$((COMMENTS + REVIEW_COMMENTS))

            if [ "$TOTAL" -gt 0 ]; then
              echo "Qodo review detected ($TOTAL comments). Fetching..."
              echo "### Qodo Review Results" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              gh pr view "$PR_NUMBER" --comments >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
              break
            fi

            echo "  Attempt $i/30 — no comments yet, waiting 10s..."
            sleep 10
          done

      - name: Cleanup — close PR and delete branch
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.create_pr.outputs.pr_number }}"
          REVIEW_BASE="${{ steps.create_pr.outputs.review_base }}"

          if [ -n "$PR_NUMBER" ]; then
            gh pr close "$PR_NUMBER" --comment "Review complete. Auto-closing." 2>/dev/null || true
          fi
          if [ -n "$REVIEW_BASE" ]; then
            git push origin --delete "$REVIEW_BASE" 2>/dev/null || true
          fi

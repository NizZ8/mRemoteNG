name: Qodo On-Demand Review

on:
  workflow_dispatch:
    inputs:
      commits_back:
        description: "Number of commits to review"
        required: true
        default: "1"
        type: string
      branch:
        description: "Branch to review"
        required: false
        default: "main"
        type: string

permissions: {}

jobs:
  create-review-pr:
    name: Create review PR for Qodo
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.branch }}

      - name: Create review branch and PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          BRANCH="${{ inputs.branch }}"
          N="${{ inputs.commits_back }}"
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          REVIEW_BRANCH="review/qodo-${TIMESTAMP}"

          # Qodo only reviews PRs targeting the default branch (main).
          # Strategy: create a branch from HEAD~N, cherry-pick the last N
          # commits onto it, then open a PR to the target branch.
          # The diff shows exactly the commits we want reviewed.

          HEAD_SHA=$(git rev-parse HEAD)
          BASE_SHA=$(git rev-parse "HEAD~${N}")

          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"

          git checkout -b "$REVIEW_BRANCH" "$BASE_SHA"
          git cherry-pick "${BASE_SHA}..${HEAD_SHA}" --allow-empty

          git push origin "$REVIEW_BRANCH"

          PR_URL=$(gh pr create \
            --base "$BRANCH" \
            --head "$REVIEW_BRANCH" \
            --title "Qodo Review: last ${N} commits on ${BRANCH}" \
            --body "$(cat <<EOF
          **Automated Qodo on-demand review** of the last ${N} commit(s) on \`${BRANCH}\`.

          This PR will be auto-closed after Qodo posts its review (~5 min).
          **Do not merge** — the commits are already on \`${BRANCH}\`.
          EOF
          )")

          echo "### Qodo Review PR Created" >> "$GITHUB_STEP_SUMMARY"
          echo "PR: ${PR_URL}" >> "$GITHUB_STEP_SUMMARY"

          PR_NUMBER=$(echo "$PR_URL" | grep -oP '\d+$')
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "review_branch=$REVIEW_BRANCH" >> "$GITHUB_OUTPUT"
        id: create_pr

      - name: Wait for Qodo review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.create_pr.outputs.pr_number }}"
          echo "Waiting for Qodo to review PR #${PR_NUMBER}..."

          for i in $(seq 1 30); do
            COMMENTS=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" --jq 'length')

            if [ "$COMMENTS" -gt 0 ]; then
              echo "Qodo review posted ($COMMENTS comments)."
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "### Review Complete" >> "$GITHUB_STEP_SUMMARY"
              echo "Qodo posted ${COMMENTS} comment(s). See the PR link above." >> "$GITHUB_STEP_SUMMARY"
              break
            fi

            echo "  Attempt $i/30 — waiting 10s..."
            sleep 10
          done

      - name: Cleanup — close PR and delete branch
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.create_pr.outputs.pr_number }}"
          REVIEW_BRANCH="${{ steps.create_pr.outputs.review_branch }}"

          if [ -n "$PR_NUMBER" ]; then
            gh pr close "$PR_NUMBER" --comment "Qodo review complete. Auto-closing." 2>/dev/null || true
          fi
          if [ -n "$REVIEW_BRANCH" ]; then
            git push origin --delete "$REVIEW_BRANCH" 2>/dev/null || true
          fi

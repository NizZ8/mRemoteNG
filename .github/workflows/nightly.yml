name: Nightly Build

on:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: read

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nightly:
    name: Build & Test (x64)
    runs-on: windows-2025-vs2026
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: 10.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57 # v3.0.0
        with:
          vs-version: "[18.0,19.0)"

      - name: Cache NuGet
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-x64-nuget-${{ hashFiles('**/*.csproj', '**/*.wixproj') }}
          restore-keys: |
            ${{ runner.os }}-x64-nuget-

      - name: Generate AssemblyInfo.cs from csproj version
        shell: pwsh
        run: |
          $csprojPath = "$env:GITHUB_WORKSPACE/mRemoteNG/mRemoteNG.csproj"
          $csprojContent = Get-Content $csprojPath -Raw
          if ($csprojContent -match '<Version>([^<]+)</Version>') {
            $csprojVersion = $matches[1].Trim()
          } else {
            throw "Could not find <Version> element in csproj"
          }
          Write-Host "Version from csproj: $csprojVersion"
          if ($csprojVersion -match '^(\d+)\.(\d+)\.(\d+)') {
            $major = [int]$matches[1]; $minor = [int]$matches[2]; $revision = [int]$matches[3]
          } else {
            throw "Could not parse version from csproj: $csprojVersion"
          }
          $prerelease = if ($csprojVersion -match '-(.+)$') { "-$($matches[1])" } else { "" }
          $channel = if ($prerelease) { "Pre-release" } else { "Release" }
          $base = [datetime]"2019-09-02"
          $build = [int](([datetime]::UtcNow - $base).TotalMinutes / 1000)
          $platform = "x64"
          $year = [datetime]::UtcNow.Year
          $content = @"
          //Generated for platform: $platform
          using System.Reflection;
          using System.Resources;
          //Build nr: $build
          [assembly: AssemblyTitle("mRemoteNG")]
          [assembly: AssemblyDescription("Multi-Remote Next Generation Connection Manager")]
          [assembly: AssemblyConfiguration("$platform")]
          [assembly: AssemblyCompany("Profi-KOM Ltd.")]
          [assembly: AssemblyProduct("mRemoteNG Connection Manager")]
          [assembly: AssemblyCopyright("(c) $year mRemoteNG")]
          [assembly: AssemblyTrademark("Profi-KOM LTd.")]
          [assembly: AssemblyCulture("")]
          [assembly: AssemblyVersion("$major.$minor.$revision.$build")]
          [assembly: AssemblyFileVersion("$major.$minor.$revision.$build")]
          [assembly: NeutralResourcesLanguageAttribute("en-US")]
          [assembly: AssemblyInformationalVersion("$major.$minor.$revision$prerelease ($channel $build) $platform")]
          "@
          $outPath = "$env:GITHUB_WORKSPACE\mRemoteNG\Properties\AssemblyInfo.cs"
          Set-Content -Path $outPath -Value $content -Encoding UTF8
          Write-Host "Generated AssemblyInfo.cs: v$major.$minor.$revision$prerelease.$build ($channel) $platform"

      - name: Build x64 Release
        run: msbuild mRemoteNG.sln /restore -m /verbosity:minimal -p:Configuration=Release -p:Platform=x64

      - name: Smoke test (app starts)
        shell: pwsh
        run: |
          # WinExe app needs Start-Process (no attached console for & operator)
          $proc = Start-Process -FilePath ".\mRemoteNG\bin\x64\Release\mRemoteNG.exe" -ArgumentList "--version" -Wait -PassThru -WindowStyle Hidden
          if ($proc.ExitCode -ne 0) { throw "Smoke test failed: exit code $($proc.ExitCode)" }
          Write-Host "Smoke test passed (exit code: $($proc.ExitCode))"

      - name: Run tests
        shell: bash
        run: bash run-tests-core.sh

      - name: Collect test results on failure
        if: failure()
        shell: pwsh
        run: |
          $outDir = "$env:GITHUB_WORKSPACE\test-results-dump"
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null
          # /tmp on GH Actions bash maps under the runner's temp — walk common roots
          $roots = @($env:TEMP, $env:TMP, "$env:GITHUB_WORKSPACE") | Where-Object { $_ } | Select-Object -Unique
          $trx = foreach ($r in $roots) { Get-ChildItem $r -Recurse -Filter *.trx -ErrorAction SilentlyContinue }
          $trx | ForEach-Object {
            $dest = Join-Path $outDir ("{0}_{1}" -f $_.Directory.Name, $_.Name)
            Copy-Item $_.FullName $dest -Force
          }
          Write-Host "Collected $($trx.Count) trx files:"
          Get-ChildItem $outDir | Select-Object Name, Length | Format-Table -AutoSize
          # Surface failed test names directly to the step log for quick triage
          foreach ($f in Get-ChildItem $outDir -Filter *.trx) {
            Write-Host ""; Write-Host "=== $($f.Name) — failures ==="
            [xml]$x = Get-Content $f.FullName -Raw
            $ns = New-Object System.Xml.XmlNamespaceManager($x.NameTable)
            $ns.AddNamespace('t','http://microsoft.com/schemas/VisualStudio/TeamTest/2010')
            $fails = $x.SelectNodes('//t:UnitTestResult[@outcome="Failed"]', $ns)
            foreach ($u in $fails) {
              Write-Host ("  X " + $u.testName)
              $msg = $u.SelectSingleNode('t:Output/t:ErrorInfo/t:Message', $ns)
              if ($msg) { Write-Host ("    " + $msg.InnerText.Split("`n")[0]) }
            }
          }

      - name: Upload test results artifact
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-results-${{ github.sha }}
          path: test-results-dump/
          retention-days: 14
          if-no-files-found: warn

      - name: Build MSI installer
        shell: pwsh
        run: |
          $csproj = Get-Content "mRemoteNG/mRemoteNG.csproj" -Raw
          if ($csproj -match '<Version>(\d+\.\d+\.\d+)') { $msiVersion = $matches[1] }
          Write-Host "Building MSI (version: $msiVersion)..."
          pwsh -NoProfile -ExecutionPolicy Bypass -File build-msi.ps1 -NoBuild -HarvestPath "$env:GITHUB_WORKSPACE\mRemoteNG\bin\x64\Release"

      - name: Compute version & create artifacts
        id: meta
        shell: pwsh
        run: |
          # Read version from csproj
          $csproj = Get-Content "mRemoteNG/mRemoteNG.csproj" -Raw
          if ($csproj -match '<Version>([^<]+)</Version>') {
            $version = $matches[1].Trim()
          } else {
            throw "Could not find <Version> in csproj"
          }

          $date = Get-Date -Format "yyyyMMdd"
          $sha = "${{ github.sha }}".Substring(0, 7)
          $zipName = "mRemoteNG-nightly-$date-v$version-$sha-x64.zip"

          # Create ZIP (framework-dependent, x64)
          $sourceDir = "mRemoteNG\bin\x64\Release"

          # Defense-in-depth: strip anything that could contain user connection data
          # before packaging. CI runners should never stage these, but the extra sweep
          # costs a few ms and the blast radius of a miss is too high to skip.
          $settingsPath = Join-Path $sourceDir 'Settings'
          if (Test-Path $settingsPath) {
            Write-Host "Removing stray Settings/ before packaging"
            Remove-Item -Recurse -Force $settingsPath
          }
          Get-ChildItem -Path $sourceDir -Recurse -File -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -like 'confCons*' -or $_.Name -like '*.xml.backup*' -or $_.Name -like '*.settings' } |
            ForEach-Object {
              Write-Host "Removing forbidden file: $($_.FullName)"
              Remove-Item -Force $_.FullName
            }

          $items = Get-ChildItem -Path $sourceDir | Where-Object {
            $_.Name -notin @('ref','publish','win-x64','win-x86','win-arm64','win-x64-sc','Settings')
          }
          Compress-Archive -Path $items.FullName -DestinationPath $zipName -Force
          Write-Host "Created: $zipName ($('{0:N1} MB' -f ((Get-Item $zipName).Length / 1MB)))"

          # Post-zip sanity check — fail the workflow if anything sensitive slipped
          # through. Uses .NET ZipFile so it does not depend on runner tar.exe.
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archive = [System.IO.Compression.ZipFile]::OpenRead((Resolve-Path $zipName))
          try {
            # Schemas/mremoteng_confcons_v2_8.xsd is a legitimate shipped asset,
            # so exclude *.xsd matches from the leak pattern.
            $leaks = $archive.Entries | ForEach-Object { $_.FullName } | Where-Object {
              ($_ -like 'Settings/*') -or
              ($_ -like '*.xml.backup*') -or
              ($_ -like '*.settings') -or
              ($_ -like '*confCons*' -and $_ -notlike '*.xsd')
            }
          }
          finally { $archive.Dispose() }
          if ($leaks) {
            Write-Error "Release ZIP contains forbidden paths:`n  $($leaks -join "`n  ")"
            exit 1
          }
          Write-Host "Sanity check passed: no Settings/confCons/backup entries in ZIP"

          # Find MSI
          $msi = Get-ChildItem -Path "mRemoteNGInstaller\bin" -Recurse -Filter "*.msi" -ErrorAction SilentlyContinue | Select-Object -First 1
          $msiName = ""
          if ($msi) {
            $msiName = "mRemoteNG-nightly-$date-v$version-$sha-x64.msi"
            Copy-Item $msi.FullName -Destination $msiName
            Write-Host "MSI: $msiName ($('{0:N1} MB' -f ((Get-Item $msiName).Length / 1MB)))"
          } else {
            Write-Warning "MSI not found - ZIP only release"
          }

          echo "zipname=$zipName" >> $env:GITHUB_OUTPUT
          echo "msiname=$msiName" >> $env:GITHUB_OUTPUT
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "date=$date" >> $env:GITHUB_OUTPUT
          echo "sha=$sha" >> $env:GITHUB_OUTPUT

      - name: Delete previous nightly release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true

      - name: Create nightly release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: nightly
          name: "Nightly Build — ${{ steps.meta.outputs.date }} (v${{ steps.meta.outputs.version }})"
          files: |
            ${{ steps.meta.outputs.zipname }}
            ${{ steps.meta.outputs.msiname }}
          body: |
            ## Nightly Build

            **Version:** v${{ steps.meta.outputs.version }}
            **Date:** ${{ steps.meta.outputs.date }}
            **Commit:** [${{ steps.meta.outputs.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            **Architecture:** x64 (framework-dependent)
            **Tests:** All passed

            ### Downloads

            | Format | Description |
            |--------|-------------|
            | **ZIP** | Portable — extract and run |
            | **MSI** | Windows Installer — installs to Program Files with shortcuts |

            > [!WARNING]
            > This is an automated build from the `main` branch. It includes the latest changes but may not be fully tested in production scenarios. For stable releases, use the [latest release](https://github.com/${{ github.repository }}/releases/tag/v1.81.0) or [legacy](https://github.com/${{ github.repository }}/releases/tag/v1.76.20).

            The framework-dependent build requires [.NET Desktop Runtime 10.0](https://dotnet.microsoft.com/download/dotnet/10.0).

            This release is automatically replaced on every push to `main`.
          draft: false
          prerelease: true

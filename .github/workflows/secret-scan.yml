name: Secret Scanning

# Satisfies CII Best Practices criterion: no_leaked_credentials
# https://bestpractices.coreinfrastructure.org/en/criteria#no_leaked_credentials
#
# Runs gitleaks on every PR and push to detect accidentally committed
# credentials, API keys, or private keys before they reach the main branch.

on:
  pull_request:
    branches:
      - v1.78.2-dev
      - main
  push:
    branches:
      - v1.78.2-dev
      - main
      - release/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Detect leaked credentials
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # .gitleaks.toml at the repository root is picked up automatically.
        # Known intentional constants (legacy encryption key, RBAC default
        # password) are allowlisted there to prevent false positives.
